aid: amazon-launch-wizard
name: Amazon Launch Wizard
description: >-
  AWS Launch Wizard is a service that guides you through the sizing, configuration,
  and deployment of enterprise applications on AWS, such as Microsoft SQL Server
  Always On and HANA-based SAP systems, without the need to manually identify
  and provision individual AWS resources.
