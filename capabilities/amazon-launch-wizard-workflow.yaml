naftiko: 1.0.0-alpha2
info:
  label: Amazon Launch Wizard Workflow
  description: Unified workflow capability for Amazon Launch Wizard combining resource management and operations.
  tags:
  - Amazon Launch Wizard
  - AWS
  - Workflow
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
capability:
  consumes:
  - type: http
    namespace: launch-wizard
    baseUri: https://launchwizard.us-east-1.amazonaws.com
    description: Amazon Launch Wizard service.
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_ACCESS_KEY_ID}}'
      placement: header
    resources:
    - name: deployments
      path: /deployments
      description: Launch Wizard deployment management
      operations:
      - name: createdeployment
        method: POST
        description: Creates a deployment for the given workload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listdeployments
        method: GET
        description: Lists the deployments that have been created.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getdeployment
        method: GET
        description: Returns information about the deployment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: launch-wizard-api
    description: REST API for Amazon Launch Wizard workflow.
    resources: []
  - type: mcp
    port: 9090
    namespace: launch-wizard-mcp
    transport: http
    description: MCP server for Amazon Launch Wizard.
    tools:
    - name: deployments-create-deployment
      description: Creates a deployment for the given workload.
      hints:
        readOnly: false
        idempotent: false
      call: launch-wizard.createdeployment
      outputParameters:
      - type: object
        mapping: $.
    - name: deployments-list-deployments
      description: Lists the deployments that have been created.
      hints:
        readOnly: true
        idempotent: true
      call: launch-wizard.listdeployments
      outputParameters:
      - type: object
        mapping: $.
    - name: deployments-get-deployment
      description: Returns information about the deployment.
      hints:
        readOnly: true
        idempotent: true
      call: launch-wizard.getdeployment
      outputParameters:
      - type: object
        mapping: $.
