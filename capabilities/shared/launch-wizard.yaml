naftiko: 1.0.0-alpha1
info:
  label: Amazon Launch Wizard
  description: Amazon Launch Wizard API for managing launch wizard resources.
  tags:
  - Amazon Launch Wizard
  - AWS
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
capability:
  consumes:
  - type: http
    namespace: launch-wizard
    baseUri: https://launchwizard.us-east-1.amazonaws.com
    description: Amazon Launch Wizard service.
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_ACCESS_KEY_ID}}'
      placement: header
    resources:
    - name: deployments
      path: /deployments
      description: Launch Wizard deployment management
      operations:
      - name: createdeployment
        method: POST
        description: Creates a deployment for the given workload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listdeployments
        method: GET
        description: Lists the deployments that have been created.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getdeployment
        method: GET
        description: Returns information about the deployment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8101
    namespace: launch-wizard-rest
    resources: []
  - type: mcp
    port: 9101
    namespace: launch-wizard-mcp
    transport: http
    tools:
    - name: createdeployment
      description: Creates a deployment for the given workload.
      hints:
        readOnly: false
        idempotent: false
      call: launch-wizard.createdeployment
      outputParameters:
      - type: object
        mapping: $.
    - name: listdeployments
      description: Lists the deployments that have been created.
      hints:
        readOnly: true
        idempotent: true
      call: launch-wizard.listdeployments
      outputParameters:
      - type: object
        mapping: $.
